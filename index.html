<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

  body{
    font-family:Inter,system-ui;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
    padding:12px;
  }

  .container{
    max-width:600px;
    margin:auto;
  }

  h2{
    font-size:22px;
  }

  select{
    width:90px;
    min-width:80px;
    padding:10px;
    font-size:15px;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
  }

  td{
    padding:14px;
    text-align:center;
    overflow:visible;
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    min-width:520px;
  }

  .tableContainer{
    width:100%;
    overflow-x:auto;
  }

  th{
    position:sticky;
    top:0;
    background:#020617;
    z-index:10;
  }

  tr:hover{
    background:#ffffff20;
  }

  td{
    padding:10px 6px;
    text-align:center;
  }

  .extraRow{
    background:#312e81;
    border-top:2px dashed #6366f1;
  }

  body.light-mode .extraRow{
    background:#eef2ff;
  }

  input{
    width:80px;
    font-size:18px;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
  }

  button{
    width:100%;
    padding:16px;
    margin-top:14px;
    font-size:18px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    font-weight:600;
  }

  .status{
    margin-top:12px;
    font-size:18px;
  }

  .error{
    color:#f87171;
  }

  .success{
    color:#4ade80;
  }

  .headerBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }

  .themeToggle{
    width:40px;
    height:40px;
    font-size:18px;
    border-radius:50%;
    background:#1e293b;
    color:white;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.3s ease;
  }

  .themeToggle:hover{
    transform:scale(1.1);
  }

  .lineSelector{
    width:100%;
    font-size:18px;
    padding:14px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
  }

  .statusIndicator{
    font-size:14px;
    margin-bottom:12px;
    color:#9ca3af;
  }

  body.light-mode{
    background:#f1f5f9;
    color:#0f172a;
  }

  body.light-mode table{
    background:white;
  }

  body.light-mode th{
    background:#e2e8f0;
    color:#0f172a;
  }

  body.light-mode tr:hover{
    background:#e2e8f0;
  }

  body.light-mode input,
  body.light-mode select{
    background:white;
    color:#0f172a;
    border:1px solid #cbd5e1;
  }

  body.light-mode .card{
    background:white;
  }

  .card{
    background:#1e293b;
    border-radius:14px;
    padding:16px;
    margin-top:14px;
    box-shadow:0 6px 14px rgba(0,0,0,0.35);
  }

  .activeRow{
    background:#ffffff30;
  }

  body.light-mode .activeRow{
    background:#cbd5e1;
  }

  #tdTable tr{
    cursor:pointer;
  }

</style>
</head>

<body>

<div class="container">

  <div class="headerBar">

  <h2>TD Verification</h2>

  <button onclick="toggleTheme()" id="themeToggle" class="themeToggle">
  🌙
  </button>

  </div>

  <div id="connectionStatus" class="statusIndicator">
    🟢 Online
  </div>

  <div class="card">
    <select id="lineSelect" class="lineSelector">
      <option value="">Select Assembly Line</option>
    </select>
  </div>

  <div id="tableArea" class="card">
  </div>
  
  <div class="card">
    <button onclick="addExtraRow()">➕ Add Extra Item</button>
    <button onclick="clearLine()">🧹 Clear Line</button>
    <button id="saveBtn" onclick="save()">Save Verification</button>
  </div>

  <div id="status" class="status">
  </div>

</div>

<script>

let TD = {};

document.addEventListener("focusin",function(e){

  const row=e.target.closest("tr");

  if(!row) return;

  document.querySelectorAll("#tdTable tr").forEach(r=>{
    r.classList.remove("activeRow");
  });

  row.classList.add("activeRow");

});

let darkMode=true;

function toggleTheme(){

  const body=document.body;
  const btn=document.getElementById("themeToggle");

  if(body.classList.contains("light-mode")){

    body.classList.remove("light-mode");
    btn.innerHTML="🌙";

  }else{

    body.classList.add("light-mode");
    btn.innerHTML="☀️";

  }

}

function updateConnectionStatus(){

  const el=document.getElementById("connectionStatus");

  if(navigator.onLine){
    el.innerHTML="🟢 Online";
  }else{
    el.innerHTML="🔴 Offline";
  }

}

window.addEventListener("online",updateConnectionStatus);
window.addEventListener("offline",updateConnectionStatus);

updateConnectionStatus();

let extraRows = [];

google.script.run.withSuccessHandler(data=>{

  TD=data;

  const sel=document.getElementById("lineSelect");

  sel.innerHTML="<option value=''>Select Line</option>";

  Object.keys(TD).forEach(l=>{
    sel.innerHTML+=`<option>${l}</option>`;
  });

}).getTDData();

lineSelect.onchange=render;

function render(){

  const line=lineSelect.value;

  if(!TD[line]) return;

  let html=`
  <div class="tableContainer">
  <table id="tdTable">
  <tr>
  <th>Code</th>
  <th>Description</th>
  <th>TD</th>
  <th>Used</th>
  <th>Actual</th>
  </tr>`;

  TD[line].forEach((i,idx)=>{

    html+=`
    <tr>
      <td>${i.itemCode}</td>
      <td style="max-width:120px;word-break:break-word;">${i.itemName}</td>
      <td>${i.tdQty} ${i.unit}</td>

      <td>
        <select id="used_${idx}" onchange="toggleActual(${idx})">
          <option value="YES" selected>YES</option>
          <option value="NO">NO</option>
        </select>
      </td>

      <td>
        <input id="qty_${idx}" type="number">
      </td>
    </tr>`;
  });

  html+=`</table></div>`;

  tableArea.innerHTML=html;

}

function addExtraRow(){

  const table=document.getElementById("tdTable");

  const id="extra_"+Date.now();

  const row=`
  <tr id="${id}" class="extraRow">

    <td><input placeholder="Code"></td>

    <td><input placeholder="Item Name"></td>

    <td>EXTRA</td>

    <td>
      <select>
        <option>YES</option>
        <option>NO</option>
      </select>
    </td>

    <td>
      <input type="number">
    </td>

  </tr>`;

  table.insertAdjacentHTML("beforeend",row);

  extraRows.push(id);

}

function clearLine(){

  const table=document.getElementById("tdTable");

  if(!table) return;

  const inputs=table.querySelectorAll("input");

  inputs.forEach(i=>{
    i.value="";
  });

  const selects=table.querySelectorAll("select");

  selects.forEach(s=>{
    s.value="YES";
  });

}

function toggleActual(idx){

  const used=document.getElementById(`used_${idx}`).value;
  const qty=document.getElementById(`qty_${idx}`);

  if(used==="NO"){
    qty.value=0;
    qty.disabled=true;
  }else{
    qty.disabled=false;
  }

}

function collect(){

  const line=lineSelect.value;

  let rows=[];

  TD[line].forEach((i,idx)=>{

    rows.push({

      itemCode:i.itemCode,
      itemName:i.itemName,
      tdQty:i.tdQty,
      unit:i.unit,
      used:document.getElementById(`used_${idx}`).value,
      actualQty:Number(document.getElementById(`qty_${idx}`).value)||0

    });

  });

  extraRows.forEach(id=>{

    const r=document.getElementById(id);

    const cells=r.querySelectorAll("input,select");

    rows.push({

      itemCode:cells[0].value,
      itemName:cells[1].value,
      tdQty:"",
      unit:"",
      used:cells[2].value,
      actualQty:Number(cells[3].value)||0

    });

  });

  return rows;

}

function save(){

  if(!lineSelect.value){
    showError("Select line");
    return;
  }

  const btn=document.getElementById("saveBtn");

  btn.disabled=true;
  btn.innerHTML="⏳ Saving...";

  const payload={
    line:lineSelect.value,
    rows:collect()
  };

  google.script.run

  .withSuccessHandler(res=>{
    showSuccess(`TD saved successfully\nID: ${res.id}`);
    btn.disabled=false;
    btn.innerHTML="Save Verification";
  })

  .withFailureHandler(err=>{
    showError(err.message);
    btn.disabled=false;
    btn.innerHTML="Save Verification";
  })

  .saveChecklist(payload);

}

function showError(msg){

  const s=document.getElementById("status");

  s.className="status error";

  s.innerText=msg;

  setTimeout(()=>{
    s.style.opacity="0";
  },10000);

  navigator.vibrate([200,100,200]);

}

function showSuccess(msg){

  const s=document.getElementById("status");

  s.className="status success";

  s.innerText=msg;

  setTimeout(()=>{
    s.style.opacity="0";
  },10000);

  navigator.vibrate(200);

}

function showStatus(msg){

  const s=document.getElementById("status");
  s.className="status";
  s.innerText=msg;

}

</script>

</body>
</html>
